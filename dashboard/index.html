<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProofAid Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>ProofAid Transparency Dashboard</h1>
        <p>Celo-backed aid distribution visibility for NGOs and donors.</p>
      </header>

      <section class="grid" id="metrics"></section>

      <section class="panel">
        <h2>Quick Actions</h2>
        <form id="programForm" class="form">
          <input name="name" placeholder="Program name" required />
          <input name="description" placeholder="Description" required />
          <input name="budget" type="number" placeholder="Budget" min="1" required />
          <button type="submit">Create Program</button>
        </form>
      </section>

      <section class="panel">
        <h2>Recent Blockchain Events</h2>
        <ul id="transactions" class="list"></ul>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
